name: NewsRadar Daily Aggregate

on:
  schedule:
    # Кілька слотів на день і на НЕнульовій хвилині — щоб пережити затримки/відкидання
    # запланованих запусків GitHub у пікові години (рівна година о 04:00 UTC — найгірший вибір).
    # Час у UTC. Київ улітку = UTC+3, узимку = UTC+2.
    - cron: "31 4 * * *"    # ~07:31 Київ (літо) — основний ранковий
    - cron: "27 8 * * *"    # ~11:27 Київ — денний дубль (якщо ранковий проковзнув)
    - cron: "23 13 * * *"   # ~16:23 Київ — пополудневий дубль
  workflow_dispatch: {}     # запуск вручну кнопкою в інтерфейсі GitHub

permissions:
  contents: write           # щоб workflow міг комітити оновлений JSON

# Не дублювати запуски паралельно; новий — скасовує попередній, якщо той ще йде.
concurrency:
  group: daily-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run aggregator
        run: python aggregate.py

      - name: Commit & push aggregate
        run: |
          git config user.name  "newsradar-bot"
          git config user.email "actions@github.com"
          git add digest-feed.json
          # комітимо лише якщо є зміни
          git diff --staged --quiet || git commit -m "Daily aggregate: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # підтягнути можливі ручні зміни, тоді запушити (усуває конфлікт «fetch first»)
          git pull --rebase origin main
          git push
